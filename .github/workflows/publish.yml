name: Publish

permissions:
  id-token: write   # Required for OIDC authentication
  contents: write   # Required for creating GitHub Release

on:
  push:
    tags:
      # Semver tags only (e.g. 0.4.0, 1.2.3, 1.2.3-beta.1)
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'
      - run: |
          yarn install
          npm version --no-commit-hooks --no-git-tag-version "$TAG_NAME"
          npm publish --provenance --access public
        env:
          TAG_NAME: ${{ github.ref_name }}

      - name: Get latest release info
        id: get-release-info
        uses: release-flow/keep-a-changelog-action/get-release-info@v1
        with:
          release-version: latest

      - name: Publish to Github releases
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ steps.get-release-info.outputs.release-notes }}
          # prerelease: true
          # files: '*.vsix'
